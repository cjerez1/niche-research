name: Daily Niche Scan

on:
  schedule:
    - cron: '0 20 * * *'  # 20:00 UTC = 06:00 AEST (Melbourne)
  workflow_dispatch:        # Manual trigger from GitHub UI / mobile app

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run niche scanner
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          REPORT_EMAIL: ${{ secrets.REPORT_EMAIL }}
        run: node index.js

      - name: Commit daily report and history
        run: |
          git config user.name "Niche Scanner Bot"
          git config user.email "scanner@noreply.github.com"
          git add niche-research/
          git diff --staged --quiet || git commit -m "Daily scan $(date +%Y-%m-%d)"
          git pull --rebase || true
          git push
